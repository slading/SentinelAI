# =====================================================================
# SENTINEL AI // MASTER SYSTEM CONFIGURATION
# =====================================================================

app:
  name: "SentinelAI Compliance & Financial Crime Engine"
  version: "2.4.0"
  environment: "production"
  debug: false

# Generative AI Inference Engine (Groq LPU)
groq:
  primary_model: "llama-3.3-70b-versatile"
  fallback_model: "llama-3.1-8b-instant"
  temperature: 0.1
  max_tokens: 2048
  timeout: 30
  max_retries: 3

# Deterministic Statistical Fraud Detection Thresholds (Pandas Engine)
aml_thresholds:
  high_value_transaction_usd: 10000.0
  velocity_60s_max_count: 20
  velocity_1h_max_count: 5
  velocity_24h_max_spend_usd: 15000.0
  cross_device_window_minutes: 10
  cross_device_max_accounts: 5
  dormant_inactivity_days: 180
  dormant_burst_window_minutes: 5
  dormant_burst_min_txs: 10
  z_score_anomaly_threshold: 3.0
  iqr_multiplier: 1.5
  impossible_travel_window_minutes: 60

# Jurisdictional Compliance Posture
compliance:
  default_home_jurisdiction: "US"
  high_risk_countries:
    - "KP"
    - "IR"
    - "SY"
    - "MM"

# Queue Routing & Service Level Agreements (SLAs)
slas:
  LOW:
    resolution_hours: 72
    assignee_queue: "monitoring-team"
  MEDIUM:
    resolution_hours: 24
    assignee_queue: "kyc-team"
  HIGH:
    resolution_hours: 8
    assignee_queue: "ops-team"
  CRITICAL:
    resolution_hours: 2
    assignee_queue: "compliance-director"

# API & Server Configuration
server:
  host: "0.0.0.0"
  port: 8000
  reload: true
  cors_origins:
    - "*"

# Filesystem & Persistence Paths
storage:
  base_directory: "SentinelAI"
  cases_directory: "SentinelAI/cases"
  verdicts_directory: "SentinelAI/verdicts"
  tickets_directory: "SentinelAI/tickets"
  emails_directory: "SentinelAI/emails"
  reports_directory: "SentinelAI/reports"
  audit_log_path: "SentinelAI/logs/audit.log"
